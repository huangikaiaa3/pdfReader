version: "3.9"

services:
  api:
    build:
      context: .
    command: /app/docker/api/start.sh
    env_file:
      - .env
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/pdfreader
      REDIS_URL: redis://redis:6379/0
      STORAGE_ROOT: /app/storage
    ports:
      - "8000:8000"
    volumes:
      - document_storage:/app/storage
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  worker:
    build:
      context: .
    command: /app/docker/worker/start.sh
    env_file:
      - .env
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/pdfreader
      REDIS_URL: redis://redis:6379/0
      STORAGE_ROOT: /app/storage
    volumes:
      - document_storage:/app/storage
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: pdfreader
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    restart: unless-stopped

volumes:
  postgres_data:
  document_storage:
